<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Song Request</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #1e1e1e;
      border-radius: 16px;
      padding: 36px 28px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 0 40px rgba(255, 80, 180, 0.15);
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      margin-bottom: 8px;
      color: #ff50b4;
    }

    .subtitle {
      text-align: center;
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      background: #2a2a2a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #ff50b4;
    }

    button {
      width: 100%;
      padding: 13px;
      background: #ff50b4;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover { background: #e0409f; }
    button:active { transform: scale(0.98); }
    button:disabled { background: #555; cursor: not-allowed; }

    .status {
      margin-top: 16px;
      text-align: center;
      font-size: 0.9rem;
      min-height: 22px;
    }
    .status.success { color: #4caf82; }
    .status.error   { color: #f44336; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎵 Request a Song</h1>
    <p class="subtitle">Add your song to the DJ queue</p>

    <label for="songInput">Song &amp; Artist</label>
    <input type="text" id="songInput" placeholder="e.g. Dreams - Fleetwood Mac" autocomplete="off">

    <label for="requesterInput">Your Name (optional)</label>
    <input type="text" id="requesterInput" placeholder="e.g. Alex" autocomplete="off">

    <button id="submitBtn" onclick="submitRequest()">Send Request 🎤</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    async function submitRequest() {
      const songInput     = document.getElementById('songInput');
      const requesterInput = document.getElementById('requesterInput');
      const btn           = document.getElementById('submitBtn');
      const status        = document.getElementById('status');

      const song      = songInput.value.trim();
      const requester = requesterInput.value.trim();

      if (!song) {
        status.textContent = 'Please enter a song name.';
        status.className = 'status error';
        return;
      }

      btn.disabled = true;
      status.textContent = 'Sending...';
      status.className = 'status';

      try {
        const res = await fetch('/api/queue', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ song, requester })
        });

        if (res.ok) {
          status.textContent = '✅ Request sent!';
          status.className = 'status success';
          songInput.value = '';
          requesterInput.value = '';
        } else {
          const err = await res.json();
          status.textContent = '❌ ' + (err.error || 'Something went wrong.');
          status.className = 'status error';
        }
      } catch (e) {
        status.textContent = '❌ Could not reach the server.';
        status.className = 'status error';
      } finally {
        btn.disabled = false;
      }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitRequest();
    });
  </script>
</body>
</html>
