<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ΔΤΔ Jukebox</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --purple: #4B0082;
      --purple-mid: #6a0dad;
      --purple-light: #7b2fbe;
      --gold: #CFB53B;
      --gold-light: #e8d060;
      --gold-dim: #9a8420;
      --bg: #0e0a1a;
      --card: #180f2e;
      --border: rgba(207, 181, 59, 0.2);
      --text: #f0e8ff;
      --muted: #9080b0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 30% 20%, rgba(107, 13, 173, 0.35) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(207, 181, 59, 0.12) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--card);
      border-radius: 20px;
      padding: 40px 32px 36px;
      width: 100%;
      max-width: 380px;
      border: 1px solid var(--border);
      box-shadow:
        0 0 0 1px rgba(207,181,59,0.05),
        0 8px 60px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(207,181,59,0.15);
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card::before {
      content: '';
      display: block;
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold), var(--gold-dim));
      border-radius: 2px;
      margin: 0 auto 28px;
    }

    .greek-letters {
      font-family: 'Cinzel', serif;
      font-size: 2.6rem;
      font-weight: 900;
      text-align: center;
      letter-spacing: 6px;
      background: linear-gradient(135deg, var(--gold-dim) 0%, var(--gold-light) 50%, var(--gold-dim) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 12px rgba(207,181,59,0.3));
      margin-bottom: 4px;
    }

    .org-name {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      font-weight: 700;
      text-align: center;
      letter-spacing: 4px;
      color: var(--gold-dim);
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    h1 {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 1rem;
      text-align: center;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--gold-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    input[type="text"] {
      width: 100%;
      padding: 13px 15px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(207,181,59,0.18);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Lato', sans-serif;
      font-size: 0.95rem;
      margin-bottom: 18px;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    input[type="text"]::placeholder { color: rgba(144,128,176,0.5); }

    input[type="text"]:focus {
      border-color: var(--gold);
      background: rgba(207,181,59,0.05);
      box-shadow: 0 0 0 3px rgba(207,181,59,0.08);
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--purple-mid), var(--purple-light));
      color: var(--gold-light);
      border: 1px solid rgba(207,181,59,0.3);
      border-radius: 10px;
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(107,13,173,0.4);
      text-transform: uppercase;
    }

    button:hover {
      background: linear-gradient(135deg, var(--purple-light), #9b3fde);
      border-color: var(--gold);
      box-shadow: 0 4px 28px rgba(107,13,173,0.6), 0 0 12px rgba(207,181,59,0.15);
      transform: translateY(-1px);
    }

    button:active { transform: scale(0.98) translateY(0); }
    button:disabled {
      background: #2a1f3d;
      border-color: #333;
      color: #555;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .status {
      margin-top: 16px;
      text-align: center;
      font-size: 0.85rem;
      min-height: 22px;
      letter-spacing: 0.5px;
    }
    .status.success { color: #7ecba1; }
    .status.error   { color: #e07070; }

    .crest {
      text-align: center;
      margin-top: 24px;
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: rgba(207,181,59,0.2);
      text-transform: uppercase;
      font-family: 'Cinzel', serif;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="greek-letters">ΔΤΔ</div>
    <div class="org-name">Delta Tau Delta</div>
    <h1>Request a Song</h1>

    <label for="songInput">Song &amp; Artist</label>
    <input type="text" id="songInput" placeholder="e.g. Dreams — Fleetwood Mac" autocomplete="off">

    <label for="requesterInput">Your Name (optional)</label>
    <input type="text" id="requesterInput" placeholder="e.g. Alex" autocomplete="off">

    <button id="submitBtn" onclick="submitRequest()">Send Request</button>
    <div class="status" id="status"></div>

    <div class="crest">Est. 1858 · Committed to True Friendship</div>
  </div>

  <script>
    async function submitRequest() {
      const songInput      = document.getElementById('songInput');
      const requesterInput = document.getElementById('requesterInput');
      const btn            = document.getElementById('submitBtn');
      const status         = document.getElementById('status');

      const song      = songInput.value.trim();
      const requester = requesterInput.value.trim();

      if (!song) {
        status.textContent = 'Please enter a song name.';
        status.className = 'status error';
        return;
      }

      btn.disabled = true;
      status.textContent = 'Sending...';
      status.className = 'status';

      try {
        const res = await fetch('/api/queue', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ song, requester })
        });

        if (res.ok) {
          status.textContent = '✅ Request sent!';
          status.className = 'status success';
          songInput.value = '';
          requesterInput.value = '';
        } else {
          const err = await res.json();
          status.textContent = '❌ ' + (err.error || 'Something went wrong.');
          status.className = 'status error';
        }
      } catch (e) {
        status.textContent = '❌ Could not reach the server.';
        status.className = 'status error';
      } finally {
        btn.disabled = false;
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitRequest();
    });
  </script>
</body>
</html>
